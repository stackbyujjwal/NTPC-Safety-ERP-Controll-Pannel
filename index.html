<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NTPC Safety & Fire Services Management System</title>
    
    <!-- Favicon / Title Icon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='15' fill='%230A2647'/><text x='50%' y='68%' font-size='60' font-weight='bold' fill='white' text-anchor='middle'>N</text></svg>">

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- Custom Stylesheets -->
    <link rel="stylesheet" href="css/enterprise-theme.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <style>
        /* Premium NTPC Safety Portal Loader Styles */
        .ntpc-loader-wrapper {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: radial-gradient(circle at center, #144272 0%, #0A2647 55%, #05101E 100%);
            color: #ffffff !important;
            font-family: 'Poppins', 'Inter', -apple-system, sans-serif;
            text-align: center;
            position: relative;
            overflow: hidden;
            padding: 20px;
            z-index: 99999;
        }
        .ntpc-loader-wrapper::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: radial-gradient(rgba(255, 255, 255, 0.08) 1px, transparent 1px);
            background-size: 28px 28px;
            pointer-events: none;
        }
        .ntpc-loader-logo {
            height: 75px;
            object-fit: contain;
            margin-bottom: 25px;
            filter: drop-shadow(0 6px 16px rgba(0, 0, 0, 0.45));
            animation: ntpc-float 3.5s ease-in-out infinite;
        }
        @keyframes ntpc-float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
        }
        .ntpc-loader-ring {
            display: inline-block;
            position: relative;
            width: 76px;
            height: 76px;
            margin-bottom: 25px;
        }
        .ntpc-loader-ring div {
            box-sizing: border-box;
            display: block;
            position: absolute;
            width: 62px;
            height: 62px;
            margin: 7px;
            border: 3.5px solid #38BDF8;
            border-radius: 50%;
            animation: ntpc-loader-spin 1.2s cubic-bezier(0.5, 0, 0.5, 1) infinite;
            border-color: #38BDF8 transparent transparent transparent;
        }
        .ntpc-loader-ring div:nth-child(1) { animation-delay: -0.45s; border-color: #38BDF8 transparent transparent transparent; }
        .ntpc-loader-ring div:nth-child(2) { animation-delay: -0.3s; border-color: #FACC15 transparent transparent transparent; }
        .ntpc-loader-ring div:nth-child(3) { animation-delay: -0.15s; border-color: #ffffff transparent transparent transparent; }
        @keyframes ntpc-loader-spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .ntpc-loader-title {
            color: #ffffff !important;
            font-size: 26px;
            font-weight: 700;
            letter-spacing: 1.5px;
            margin: 0 0 6px 0;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
            font-family: 'Poppins', sans-serif;
        }
        .ntpc-loader-sub {
            color: #38BDF8 !important;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 1px;
            margin-bottom: 32px;
            text-transform: uppercase;
            text-shadow: 0 1px 4px rgba(0,0,0,0.3);
        }
        .ntpc-loader-status {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 10px 24px;
            border-radius: 30px;
            font-size: 13px;
            color: #F8FAFC !important;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
            font-weight: 500;
        }
        .ntpc-pulse-dot {
            width: 10px;
            height: 10px;
            background-color: #10B981;
            border-radius: 50%;
            box-shadow: 0 0 12px #10B981;
            animation: ntpc-pulse 1.5s infinite;
        }
        @keyframes ntpc-pulse {
            0% { transform: scale(0.95); opacity: 0.8; }
            50% { transform: scale(1.35); opacity: 1; box-shadow: 0 0 18px #10B981; }
            100% { transform: scale(0.95); opacity: 0.8; }
        }
        .ntpc-loader-footer {
            position: absolute;
            bottom: 25px;
            font-size: 12px;
            color: #94A3B8 !important;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
    </style>
</head>
<body>
    <!-- App Root container populated dynamically by AppController -->
    <div id="appRoot">
        <div class="ntpc-loader-wrapper">
            <img src="https://careers.ntpc.co.in/recruitment/images/logo50yr.png" alt="NTPC Logo" class="ntpc-loader-logo">
            <div class="ntpc-loader-ring"><div></div><div></div><div></div><div></div></div>
            <h1 class="ntpc-loader-title">NTPC SAFETY PORTAL</h1>
            <div class="ntpc-loader-sub">Safety & Fire Services Department</div>
            <div class="ntpc-loader-status">
                <span class="ntpc-pulse-dot"></span>
                <span>Initializing Plant Safety Registers & Live Database...</span>
            </div>
            <div class="ntpc-loader-footer">
                <i class="fas fa-shield-alt text-warning"></i> <span>Zero Harm Goal • 100% Safety Compliance • Official NTPC Limited System</span>
            </div>
        </div>
    </div>

    <!-- Firebase SDKs (Optional / Live Mode Support) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>

    <!-- External Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <!-- Main ES6 Application Router & Modules (Bundled for direct double-click local execution) -->
    <script src="js/app-bundle.js?v=4.8.1"></script>
</body>
</html>
